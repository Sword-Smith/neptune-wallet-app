name: "Release"

# This task will run whenever you push a git tag that looks like a version
# like "v1.0.0" or "v0.2.3-beta1"
on:
  pull_request:
  push:
    tags:
      - 'v[0-9]+\.[0-9]+\.[0-9]+(-.+)?'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # For your universal-apple-darwin
          - platform: "ubuntu-22.04"
            args: "" # Standard Linux build
          - platform: "ubuntu-22.04"
            args: "--runner cargo-xwin --target x86_64-pc-windows-msvc"
            windows_cross: true # Custom flag for our conditional steps

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'yarn'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: add macOS targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: setup windows cross-build dependencies
        if: matrix.windows_cross
        run: |
          sudo apt-get update
          sudo apt-get install -y nsis lld llvm
          rustup target add x86_64-pc-windows-msvc
          cargo install cargo-xwin

      - name: install frontend dependencies
        run: yarn install # This replaces your 'yarn install' step

      - name: build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # This replaces __VERSION__ with the version in your tauri.conf.json
          releaseName: "Neptune Wallet v__VERSION__"
          releaseBody: "Automated release from GitHub Actions."
          releaseDraft: true
          prerelease: false
          # We use your existing Taskfile logic here
          args: ${{ matrix.platform == 'macos-latest' && '--target universal-apple-darwin' || '' }}
